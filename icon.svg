<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#250046"/>
      <stop offset="1" stop-color="#08000f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff2bd6"/>
      <stop offset=".5" stop-color="#ff5e3a"/>
      <stop offset="1" stop-color="#ffd24a"/>
    </linearGradient>
    <filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <clipPath id="round"><rect width="64" height="64" rx="13"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="64" height="64" fill="url(#sky)"/>
    <!-- glowing sun -->
    <g filter="url(#gl)"><circle cx="32" cy="29" r="15.5" fill="url(#sun)"/></g>
    <circle cx="32" cy="29" r="15.5" fill="url(#sun)"/>
    <!-- sun slits (widen toward bottom) -->
    <g fill="#08000f">
      <rect x="15" y="30" width="34" height="1.8"/>
      <rect x="15" y="33.6" width="34" height="2.2"/>
      <rect x="15" y="37.8" width="34" height="2.8"/>
      <rect x="15" y="42.6" width="34" height="3.4"/>
    </g>
    <!-- horizon -->
    <rect x="0" y="40" width="64" height="1.6" fill="#00e5ff" opacity=".85"/>
    <!-- perspective grid -->
    <g stroke="#00e5ff" stroke-width="1" opacity=".8" filter="url(#gl)">
      <line x1="0" y1="46" x2="64" y2="46"/>
      <line x1="0" y1="53" x2="64" y2="53"/>
      <line x1="0" y1="61" x2="64" y2="61"/>
      <line x1="32" y1="40" x2="-8" y2="64"/>
      <line x1="32" y1="40" x2="12" y2="64"/>
      <line x1="32" y1="40" x2="32" y2="64"/>
      <line x1="32" y1="40" x2="52" y2="64"/>
      <line x1="32" y1="40" x2="72" y2="64"/>
    </g>
  </g>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12" fill="none" stroke="#ff2bd6" stroke-width="2" opacity=".55"/>
</svg>
