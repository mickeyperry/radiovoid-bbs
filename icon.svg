<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffb000"/>
      <stop offset=".55" stop-color="#ff6600"/>
      <stop offset="1" stop-color="#ff3300"/>
    </linearGradient>
    <radialGradient id="bg" cx=".5" cy=".38" r=".85">
      <stop offset="0" stop-color="#1d1400"/>
      <stop offset="1" stop-color="#0a0800"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="10.5" fill="none" stroke="#ffb000" stroke-width="2.6" opacity=".92"/>
  <!-- glow pass -->
  <g filter="url(#glow)" opacity=".85">
    <rect x="13" y="34" width="6" height="16" fill="url(#bar)"/>
    <rect x="23" y="22" width="6" height="28" fill="url(#bar)"/>
    <rect x="33" y="28" width="6" height="22" fill="url(#bar)"/>
    <rect x="43" y="17" width="6" height="33" fill="url(#bar)"/>
  </g>
  <!-- sharp pass -->
  <g>
    <rect x="13" y="34" width="6" height="16" fill="url(#bar)"/>
    <rect x="23" y="22" width="6" height="28" fill="url(#bar)"/>
    <rect x="33" y="28" width="6" height="22" fill="url(#bar)"/>
    <rect x="43" y="17" width="6" height="33" fill="url(#bar)"/>
  </g>
  <!-- bright caps -->
  <g fill="#ffd866">
    <rect x="13" y="34" width="6" height="2.4"/>
    <rect x="23" y="22" width="6" height="2.4"/>
    <rect x="33" y="28" width="6" height="2.4"/>
    <rect x="43" y="17" width="6" height="2.4"/>
  </g>
  <!-- scanlines -->
  <g fill="#000" opacity=".16">
    <rect x="4" y="14" width="56" height="1"/>
    <rect x="4" y="22" width="56" height="1"/>
    <rect x="4" y="30" width="56" height="1"/>
    <rect x="4" y="38" width="56" height="1"/>
    <rect x="4" y="46" width="56" height="1"/>
    <rect x="4" y="54" width="56" height="1"/>
  </g>
</svg>
